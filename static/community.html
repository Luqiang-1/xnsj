<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>社区交流论坛</title>
    <link rel="stylesheet" href="/sidebar-nav.css" />
    <link rel="stylesheet" href="/graph.css" />
    <link rel="stylesheet" href="/community.css" />
  </head>
  <body class="graph-body with-side-nav community-body">
    <nav class="side-nav" aria-label="页面导航">
      <a class="side-nav-link" href="/system.html">
        <span class="side-nav-title">智能问答</span>
      </a>
      <a class="side-nav-link" href="/knowledge-graph.html">
        <span class="side-nav-title">知识图谱</span>
      </a>
      <a class="side-nav-link active" href="/community.html">
        <span class="side-nav-title">社区交流</span>
        <span class="side-nav-note">论坛互动</span>
      </a>

      <div class="side-nav-session" aria-label="登录信息">
        <span class="side-nav-session-label">当前账号</span>
        <strong class="side-nav-session-user" data-auth-user>加载中...</strong>
        <button type="button" class="side-nav-logout" data-auth-logout>退出登录</button>
      </div>
    </nav>

    <main class="graph-shell community-shell">
      <section class="graph-hero community-hero">
        <div class="section-heading community-heading">
          <div>
            <span class="eyebrow">Community Forum</span>
            <h1>社区交流论坛</h1>
          </div>
        </div>
      </section>

      <section class="community-layout">
        <aside class="glass-panel community-composer">
          <div class="community-panel-head">
            <span class="eyebrow">Create Post</span>
            <h2>发布新帖子</h2>
            <p>可以分享种植经验、提出问题，或发起针对某类作物的讨论。</p>
          </div>

          <form id="postForm" class="community-post-form">
            <input
              id="postTitle"
              class="community-input"
              type="text"
              maxlength="60"
              placeholder="帖子标题"
              required
            />
            <textarea
              id="postContent"
              class="community-textarea"
              maxlength="2000"
              placeholder="写下你的交流内容"
              required
            ></textarea>

            <div class="community-form-actions">
              <p id="postFeedback" class="community-feedback" aria-live="polite"></p>
              <button id="postSubmitButton" type="submit" class="primary-btn">发布帖子</button>
            </div>
          </form>
        </aside>

        <section class="glass-panel community-feed" aria-label="社区帖子列表">
          <div class="community-feed-head">
            <h2>最新交流</h2>
            <p id="communitySummary">正在加载社区内容...</p>
          </div>

          <div id="postList" class="post-list"></div>
        </section>
      </section>
    </main>

    <script src="/auth-ui.js"></script>
    <script src="/community.js"></script>
  </body>
</html>
